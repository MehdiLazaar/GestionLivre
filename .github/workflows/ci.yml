name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Unit tests
        run: ./gradlew test

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: Unit tests results
          files: |
            build/test-results/test/*.xml

      - name: Integration tests
        run: ./gradlew testIntegration

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: Integration tests results
          files: |
            build/test-results/testIntegration/*.xml

      - name: Component tests
        run: ./gradlew testComponent

      - name: Publish component test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: Component tests results
          files: |
            build/test-results/testComponent/*.xml

      - name: Architecture tests
        run: ./gradlew testArchitecture

      - name: Publish architecture test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: Architecture tests results
          files: |
            build/test-results/testArchitecture/*.xml

      - name: JaCoCo report
        run: ./gradlew jacocoTestReport

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/

      - name: Mutation tests
        run: ./gradlew pitest

      - name: Upload PIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-report
          path: build/reports/pitest/

      - name: Detekt
        run: ./gradlew detekt